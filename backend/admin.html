<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrations Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    .subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      flex: 1;
    }
    .stat-card .number {
      font-size: 2rem;
      font-weight: 500;
      color: #22c55e;
    }
    .stat-card .label {
      font-size: 0.8rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      border-bottom: 1px solid #222;
      font-weight: 500;
    }
    td {
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      border-bottom: 1px solid #1a1a1a;
      color: #ccc;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1a1a; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.7rem;
      background: #22c55e20;
      color: #22c55e;
      border: 1px solid #22c55e30;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: #666;
    }
    .error {
      text-align: center;
      padding: 3rem;
      color: #ef4444;
    }
    .refresh-btn {
      background: #22c55e;
      color: #000;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .refresh-btn:hover { opacity: 0.8; }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <div>
        <h1>📋 Registrations</h1>
        <p class="subtitle">Live from Supabase (PostgreSQL)</p>
      </div>
      <button class="refresh-btn" onclick="fetchRegistrations()">⟳ Refresh</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="number" id="totalCount">0</div>
        <div class="label">Total Registrations</div>
      </div>
      <div class="stat-card">
        <div class="number" id="todayCount">0</div>
        <div class="label">Registered Today</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="4" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function fetchRegistrations() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="4" class="loading">Loading...</td></tr>';

      try {
        const res = await fetch('http://localhost:3000/api/registrations');
        const json = await res.json();

        if (!json.success) throw new Error(json.error);

        const data = json.data;
        
        document.getElementById('totalCount').textContent = data.length;

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayRegs = data.filter(r => new Date(r.createdAt) >= today);
        document.getElementById('todayCount').textContent = todayRegs.length;

        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">No registrations yet 🙃</td></tr>';
          return;
        }

        tbody.innerHTML = data.map(r => {
          const date = new Date(r.createdAt);
          const dateStr = date.toLocaleDateString('en-US', { 
            month: 'short', day: 'numeric', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
          return `
            <tr>
              <td>${r.fullName}</td>
              <td>${r.email}</td>
              <td>${dateStr}</td>
              <td><span class="badge">Active</span></td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="error">⚠️ ${err.message}</td></tr>`;
      }
    }

    fetchRegistrations();
    setInterval(fetchRegistrations, 30000);
  </script>
</body>
</html>
